<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital</title>

<link rel="preload" href="bloque1.webp" as="image">
<link rel="preload" href="bloque2.webp" as="image">
<link rel="preload" href="bloque3.webp" as="image">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#000;
  display:flex;
  justify-content:center;
}

.contenedor{
  max-width:430px;
  width:100%;
}

.bloque img{
  width:100%;
  display:block;
}

/* BOTÓN AUDIO 3D */
.audio-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(145deg,#ff6bd6,#ff1aa3);
  box-shadow:
    0 10px 20px rgba(0,0,0,0.6),
    inset 0 -4px 8px rgba(255,255,255,0.35),
    inset 0 4px 6px rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:#fff;
  cursor:pointer;
  z-index:999;
  transition:0.25s;
}

.audio-btn:active{
  transform:scale(0.92);
  box-shadow:0 5px 12px rgba(0,0,0,0.8);
}

/* EFECTO SCROLL */
.bloque{
  opacity:0;
  transform:translateY(40px) scale(0.98);
  transition:all 0.9s cubic-bezier(.19,1,.22,1);
}

.bloque.visible{
  opacity:1;
  transform:translateY(0) scale(1);
}
.bloque-btn{
  position:relative;
}

.texto-boton{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:75%;
  text-align:center;
  font-size:16px;
  line-height:1.35;
  color:#5a2a3a;
  font-weight:500;
}

.texto-boton span{
  display:block;
}

@media(max-width:420px){
  .texto-boton{
    font-size:14px;
  }
}

</style>
</head>

<body>

<div class="contenedor">

  <div class="bloque"><img src="bloque1.webp" loading="eager"></div>
 <div class="bloque bloque-btn">
  <img src="bloque2.webp">
  <div class="texto-boton">
    <span>Con mucho entusiasmo y alegría,</span>
    <span>los invitamos a celebrar</span>
    <span>el momento más especial</span>
    <span>de mi vida</span>
  </div>
</div>
  <div class="bloque"><img src="bloque3.webp"></div>
  <div class="bloque"><img src="bloque4.webp"></div>
  <div class="bloque"><img src="bloque5.webp"></div>
  <div class="bloque"><img src="bloque6.webp"></div>
  <div class="bloque"><img src="bloque7.webp"></div>
  <div class="bloque"><img src="bloque8.webp"></div>
  <div class="bloque"><img src="bloque9.webp"></div>
  <div class="bloque"><img src="bloque10.webp"></div>

</div>

<!-- AUDIO -->
<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- BOTÓN AUDIO -->
<div class="audio-btn" id="btnAudio">▶</div>

<script>
const musica = document.getElementById("musica");
const btn = document.getElementById("btnAudio");
let activo = false;

btn.addEventListener("click", () => {
  if(!activo){
    musica.play();
    btn.innerHTML = "⏸";
    activo = true;
  } else {
    musica.pause();
    btn.innerHTML = "▶";
    activo = false;
  }
});

document.addEventListener("touchstart", () => {
  if(!activo){
    musica.play();
    btn.innerHTML = "⏸";
    activo = true;
  }
},{ once:true });

/* EFECTO SCROLL */
const bloques = document.querySelectorAll('.bloque');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
},{
  threshold:0.15
});

bloques.forEach(bloque => observer.observe(bloque));
</script>

</body>
</html>
