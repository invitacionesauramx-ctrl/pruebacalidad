<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital</title>

<link rel="preload" href="bloque1.webp" as="image">
<link rel="preload" href="bloque2.webp" as="image">
<link rel="preload" href="bloque3.webp" as="image">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#000;display:flex;justify-content:center;}
.contenedor{max-width:430px;width:100%;}
.bloque img{width:100%;display:block;}

/* BOTÓN AUDIO */
.audio-btn{
  position:fixed;bottom:20px;right:20px;width:70px;height:70px;border-radius:50%;
  background:linear-gradient(145deg,#ff6bd6,#ff1aa3);
  box-shadow:0 10px 20px rgba(0,0,0,.6), inset 0 -4px 8px rgba(255,255,255,.35), inset 0 4px 6px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;
  cursor:pointer;z-index:999;transition:.25s;
}
.audio-btn:active{transform:scale(.92);}

/* EFECTO SCROLL */
.bloque{
  opacity:0;
  transform:translateY(40px) scale(.98);
  transition:all .9s cubic-bezier(.19,1,.22,1);
}
.bloque.visible{opacity:1;transform:translateY(0) scale(1);}

/* FORZAR VISIBILIDAD INICIAL */
.bloque:first-child{opacity:1!important;transform:none!important;}

.bloque-btn{position:relative;}
.texto-boton{
  position:absolute;left:50%;top:84%;
  transform:translate(-50%,-50%);
  width:72%;text-align:center;font-size:16px;line-height:1.35;
  color:#5a2a3a;font-weight:500;pointer-events:none;
}
.texto-boton span{display:block;}

@media(max-width:420px){
  .texto-boton{font-size:14px;width:80%;}
}

.bloque-particulas, .bloque-particulas-xv, .bloque-contador{position:relative;}
canvas{position:absolute;inset:0;pointer-events:none;}

/* CONTADOR */
.countdown{
  position:absolute;bottom:14%;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:5;
}
.time-box{
  width:68px;height:78px;border-radius:14px;
  background:linear-gradient(145deg,#ff86cf,#ff3fa7);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;
  box-shadow:0 10px 25px rgba(255,0,160,.45),
             inset 0 -3px 6px rgba(255,255,255,.35),
             inset 0 4px 6px rgba(0,0,0,.3);
  animation:floatPink 3s ease-in-out infinite;
}
.time-box span{font-size:26px;font-weight:700;}
.time-box small{font-size:11px;letter-spacing:1px;opacity:.9;}

@keyframes floatPink{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}
</style>
</head>

<body>
<div class="contenedor">

<div class="bloque bloque-particulas">
  <img src="bloque1.webp" loading="eager">
  <canvas id="particulas"></canvas>
</div>

<div class="bloque bloque-btn">
  <img src="bloque2.webp">
  <div class="texto-boton">
    <span>Con mucho entusiasmo y alegría,</span>
    <span>los invitamos a celebrar</span>
    <span>el momento más especial</span>
    <span>de mi vida</span>
  </div>
</div>

<div class="bloque bloque-particulas-xv">
  <img src="bloque3.webp">
  <canvas id="particulasXV"></canvas>
</div>

<div class="bloque"><img src="bloque4.webp"></div>
<div class="bloque"><img src="bloque5.webp"></div>

<div class="bloque bloque-contador">
  <img src="bloque6.webp">

  <div class="countdown">
    <div class="time-box"><span id="dias">00</span><small>DÍAS</small></div>
    <div class="time-box"><span id="horas">00</span><small>HRS</small></div>
    <div class="time-box"><span id="minutos">00</span><small>MIN</small></div>
    <div class="time-box"><span id="segundos">00</span><small>SEG</small></div>
  </div>

  <canvas id="particulasCountdown"></canvas>
</div>

<div class="bloque"><img src="bloque7.webp"></div>
<div class="bloque"><img src="bloque8.webp"></div>
<div class="bloque"><img src="bloque9.webp"></div>
<div class="bloque"><img src="bloque10.webp"></div>

</div>

<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="audio-btn" id="btnAudio">▶</div>

<script>
/* AUDIO */
const musica=document.getElementById("musica");
const btn=document.getElementById("btnAudio");
let activo=false;

btn.onclick=()=>{
  activo?musica.pause():musica.play();
  btn.innerHTML=activo?"▶":"⏸";
  activo=!activo;
};
document.addEventListener("touchstart",()=>{if(!activo){musica.play();btn.innerHTML="⏸";activo=true;}},{once:true});

/* SCROLL FIX */
const bloques=document.querySelectorAll(".bloque");
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{if(entry.isIntersecting)entry.target.classList.add("visible");});
},{threshold:.08});

bloques.forEach(b=>observer.observe(b));

window.addEventListener("load",()=>{
  bloques.forEach(b=>{
    const r=b.getBoundingClientRect();
    if(r.top<window.innerHeight*1.1)b.classList.add("visible");
  });
});

/* CONTADOR */
const fechaEvento=new Date("2026-02-24T22:00:00").getTime();
const d=document.getElementById("dias");
const h=document.getElementById("horas");
const m=document.getElementById("minutos");
const s=document.getElementById("segundos");

setInterval(()=>{
  const diff=fechaEvento-new Date().getTime();
  if(diff<0)return;
  d.textContent=Math.floor(diff/(1000*60*60*24)).toString().padStart(2,"0");
  h.textContent=Math.floor(diff/(1000*60*60)%24).toString().padStart(2,"0");
  m.textContent=Math.floor(diff/(1000*60)%60).toString().padStart(2,"0");
  s.textContent=Math.floor(diff/1000%60).toString().padStart(2,"0");
},1000);
</script>
</body>
</html>
