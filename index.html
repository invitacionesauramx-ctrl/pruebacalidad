<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

html{ scroll-behavior:smooth; }

body{
  background:#000;
  display:flex;
  justify-content:center;
}

.contenedor{
  max-width:430px;
  width:100%;
}

.bloque img{
  width:100%;
  display:block;
}

/* BOTÓN AUDIO 3D */
.audio-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(145deg,#ff6bd6,#ff1aa3);
  box-shadow:0 10px 20px rgba(0,0,0,.6),
             inset 0 -4px 8px rgba(255,255,255,.35),
             inset 0 4px 6px rgba(0,0,0,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:#fff;
  cursor:pointer;
  z-index:999;
}

/* EFECTO SCROLL */
.bloque{
  opacity:0;
  transform:translateY(40px) scale(.98);
  transition:.9s cubic-bezier(.19,1,.22,1);
}

.bloque.visible{
  opacity:1;
  transform:translateY(0) scale(1);
}

.bloque:first-child{
  opacity:1 !important;
  transform:none !important;
}

/* PARTICULAS BLOQUES */
.bloque-particulas,
.bloque-particulas-xv,
.bloque-contador{ position:relative; }

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

/* CONTADOR PREMIUM */
.countdown{
  position:absolute;
  bottom:14%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:5;
}

.time-box{
  width:68px;
  height:78px;
  background:linear-gradient(145deg,#ff8ad6,#ff1493);
  border-radius:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  box-shadow:0 0 15px rgba(255,0,170,.7),
             0 0 35px rgba(255,0,170,.5);
  animation:floatPink 3s ease-in-out infinite;
}

.time-box span{
  font-size:26px;
  font-weight:700;
  text-shadow:0 0 8px rgba(255,255,255,.6);
}

.time-box small{
  font-size:11px;
}

@keyframes floatPink{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div class="contenedor">

<div class="bloque bloque-particulas">
  <img src="bloque1.webp">
  <canvas id="p1"></canvas>
</div>

<div class="bloque">
  <img src="bloque2.webp">
</div>

<div class="bloque bloque-particulas-xv">
  <img src="bloque3.webp">
  <canvas id="pXV"></canvas>
</div>

<div class="bloque"><img src="bloque4.webp"></div>
<div class="bloque"><img src="bloque5.webp"></div>

<div class="bloque bloque-contador">
  <img src="bloque6.webp">

  <div class="countdown">
    <div class="time-box"><span id="dias">00</span><small>DÍAS</small></div>
    <div class="time-box"><span id="horas">00</span><small>HRS</small></div>
    <div class="time-box"><span id="minutos">00</span><small>MIN</small></div>
    <div class="time-box"><span id="segundos">00</span><small>SEG</small></div>
  </div>

  <canvas id="pCount"></canvas>
</div>

<div class="bloque"><img src="bloque7.webp"></div>
<div class="bloque"><img src="bloque8.webp"></div>
<div class="bloque"><img src="bloque9.webp"></div>
<div class="bloque"><img src="bloque10.webp"></div>

</div>

<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="audio-btn" id="btnAudio">▶</div>

<script>
/* AUDIO */
const musica = document.getElementById("musica");
const btn = document.getElementById("btnAudio");
let activo=false;

btn.onclick=()=>{
  if(!activo){ musica.play(); btn.innerHTML="⏸"; activo=true; }
  else{ musica.pause(); btn.innerHTML="▶"; activo=false; }
};

/* SCROLL FIX */
const bloques=document.querySelectorAll('.bloque');
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{ if(x.isIntersecting)x.target.classList.add('visible'); });
},{threshold:.08});

bloques.forEach(b=>obs.observe(b));
window.onload=()=>bloques.forEach(b=>{
  if(b.getBoundingClientRect().top<window.innerHeight*1.1)
    b.classList.add('visible');
});

/* CONTADOR */
const fechaEvento=new Date("2026-12-24T22:00:00").getTime();
setInterval(()=>{
  const now=Date.now();
  let diff=fechaEvento-now;
  if(diff<0) return;
  document.getElementById("dias").innerText=Math.floor(diff/86400000);
  document.getElementById("horas").innerText=Math.floor(diff/3600000)%24;
  document.getElementById("minutos").innerText=Math.floor(diff/60000)%60;
  document.getElementById("segundos").innerText=Math.floor(diff/1000)%60;
},1000);

/* PARTICULAS ROSAS 4D */
const c=document.getElementById("pCount"),ctx=c.getContext("2d");
function resize(){c.width=c.offsetWidth;c.height=c.offsetHeight}
resize();addEventListener("resize",resize);

let parts=[];
function spawn(){
  return{ x:c.width/2+(Math.random()*200-100),
          y:c.height*.75,
          r:Math.random()*2+1,
          dx:(Math.random()-.5)*1.2,
          dy:-Math.random()*2-1,
          a:1 }
}

function loop(){
  ctx.clearRect(0,0,c.width,c.height);
  if(parts.length<120) parts.push(spawn());
  parts.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,80,180,${p.a})`;
    ctx.fill();
    p.x+=p.dx; p.y+=p.dy; p.a-=.015;
    if(p.a<=0) parts.splice(i,1);
  });
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
