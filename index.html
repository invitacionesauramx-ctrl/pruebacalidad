<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#000;display:flex;justify-content:center;}
.contenedor{max-width:430px;width:100%;}

.bloque{
  position:relative;
}

.bloque img{
  width:100%;
  display:block;
  position:relative;
  z-index:1;
}

/* CANVAS */
canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:2;
}

/* CONTADOR */
.contador{
  position:absolute;
  left:50%;
  top:70%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:10px;
  cursor:grab;
  z-index:10;
}

.tiempo{
  width:65px;
  height:75px;
  background:linear-gradient(145deg,#fff,#f2f2f2);
  border-radius:14px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow:0 6px 14px rgba(0,0,0,.3);
}

.tiempo span{
  font-size:24px;
  font-weight:700;
  color:#a88a4a;
}

.tiempo small{
  font-size:11px;
  color:#444;
}

.audio-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(145deg,#ff6bd6,#ff1aa3);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  z-index:999;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="contenedor">

<div class="bloque">
  <img src="bloque1.webp">
  <canvas id="particulas"></canvas>
</div>

<div class="bloque">
  <img src="bloque2.webp">
</div>

<div class="bloque">
  <img src="bloque3.webp">
  <canvas id="particulasXV"></canvas>
</div>

<div class="bloque"><img src="bloque4.webp"></div>
<div class="bloque"><img src="bloque5.webp"></div>

<div class="bloque" id="bloque6">
  <img src="bloque6.webp">

  <div class="contador" id="contador">
    <div class="tiempo"><span id="dias">00</span><small>Días</small></div>
    <div class="tiempo"><span id="horas">00</span><small>Horas</small></div>
    <div class="tiempo"><span id="minutos">00</span><small>Min</small></div>
    <div class="tiempo"><span id="segundos">00</span><small>Seg</small></div>
  </div>

</div>

<div class="bloque"><img src="bloque7.webp"></div>
<div class="bloque"><img src="bloque8.webp"></div>
<div class="bloque"><img src="bloque9.webp"></div>
<div class="bloque"><img src="bloque10.webp"></div>

</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="audio-btn" id="btnAudio">▶</div>

<script>
/* AUDIO */
const musica=document.getElementById("musica");
const btn=document.getElementById("btnAudio");
let activo=false;

btn.onclick=()=>{
  activo?musica.pause():musica.play();
  btn.innerHTML=activo?"▶":"⏸";
  activo=!activo;
};

/* PARTÍCULAS */
function crearParticulas(canvas,color){
  const ctx=canvas.getContext("2d");
  let w,h;
  function resize(){
    w=canvas.width=canvas.offsetWidth;
    h=canvas.height=canvas.offsetHeight;
  }
  resize();
  window.addEventListener("resize",resize);

  const p=[...Array(35)].map(()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+1,dx:(Math.random()-.5),dy:(Math.random()-.5),a:Math.random()}));

  (function anim(){
    ctx.clearRect(0,0,w,h);
    p.forEach(o=>{
      ctx.beginPath();
      ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${color},${o.a})`;
      ctx.fill();
      o.x+=o.dx;
      o.y+=o.dy;
      if(o.x<0||o.x>w)o.dx*=-1;
      if(o.y<0||o.y>h)o.dy*=-1;
    });
    requestAnimationFrame(anim);
  })();
}

crearParticulas(document.getElementById("particulas"),"255,215,0");
crearParticulas(document.getElementById("particulasXV"),"192,192,192");

/* CUENTA REGRESIVA */
const fechaEvento=new Date("December 17, 2026 18:00:00").getTime();

setInterval(()=>{
  const d=fechaEvento-new Date().getTime();
  if(d<0)return;
  dias.innerText=Math.floor(d/86400000).toString().padStart(2,"0");
  horas.innerText=Math.floor((d%86400000)/3600000).toString().padStart(2,"0");
  minutos.innerText=Math.floor((d%3600000)/60000).toString().padStart(2,"0");
  segundos.innerText=Math.floor((d%60000)/1000).toString().padStart(2,"0");
},1000);

/* DRAG */
const contador=document.getElementById("contador");
let mov=false,ox=0,oy=0;

contador.onmousedown=e=>{
  mov=true; ox=e.offsetX; oy=e.offsetY;
};

document.onmousemove=e=>{
  if(!mov)return;
  const r=bloque6.getBoundingClientRect();
  contador.style.left=(e.clientX-r.left-ox)+"px";
  contador.style.top=(e.clientY-r.top-oy)+"px";
  contador.style.transform="none";
};

document.onmouseup=()=>mov=false;

/* TOUCH */
contador.ontouchstart=e=>{
  mov=true;
  const t=e.touches[0];
  const r=contador.getBoundingClientRect();
  ox=t.clientX-r.left;
  oy=t.clientY-r.top;
};

document.ontouchmove=e=>{
  if(!mov)return;
  const t=e.touches[0];
  const r=bloque6.getBoundingClientRect();
  contador.style.left=(t.clientX-r.left-ox)+"px";
  contador.style.top=(t.clientY-r.top-oy)+"px";
  contador.style.transform="none";
};

document.ontouchend=()=>mov=false;
</script>

</body>
</html>
