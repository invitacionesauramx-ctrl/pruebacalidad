<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación XV</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat', sans-serif;
  background:#000;
}

/* BLOQUES */
.bloque{
  width:100%;
}

.bloque img{
  width:100%;
  height:auto; /* 🔥 no se corta */
  display:block;
}

/* TEXTO SOBRE IMAGEN (opcional si lo quieres usar) */
.contenido{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
  width:90%;
}

h1{
  font-family:'Dancing Script', cursive;
  font-size:2.5rem;
}

@media(max-width:768px){
  h1{font-size:2rem;}
}

</style>
</head>
<body>

<!-- BLOQUE 1 -->
<section class="bloque">
  <img src="bloque1.webp" alt="Bloque 1">
</section>

<!-- BLOQUE 2 -->
<section class="bloque">
  <img src="bloque2.webp" alt="Bloque 2">
</section>

<!-- BLOQUE 3 -->

</section>

<!-- BLOQUE 4 -->

<!-- BLOQUE 5 -->

</section>
