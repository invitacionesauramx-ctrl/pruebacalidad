<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital</title>

<link rel="preload" href="bloque1.webp" as="image">
<link rel="preload" href="bloque2.webp" as="image">
<link rel="preload" href="bloque3.webp" as="image">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#000;
  display:flex;
  justify-content:center;
}

.contenedor{
  max-width:430px;
  width:100%;
}

.bloque img{
  width:100%;
  display:block;
}

/* BOTÓN AUDIO 3D */
.audio-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(145deg,#ff6bd6,#ff1aa3);
  box-shadow:
    0 10px 20px rgba(0,0,0,0.6),
    inset 0 -4px 8px rgba(255,255,255,0.35),
    inset 0 4px 6px rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:#fff;
  cursor:pointer;
  z-index:999;
  transition:0.25s;
}

.audio-btn:active{
  transform:scale(0.92);
  box-shadow:0 5px 12px rgba(0,0,0,0.8);
}

/* EFECTO SCROLL */
.bloque{
  opacity:0;
  transform:translateY(40px) scale(0.98);
  transition:all 0.9s cubic-bezier(.19,1,.22,1);
}

.bloque.visible{
  opacity:1;
  transform:translateY(0) scale(1);
}
.bloque-btn{
  position:relative;
}

.texto-boton {
  position: absolute;
  left: 50%;
  top: 84%; /* Ajusta este valor según el cuadro del botón */
  transform: translate(-50%, -50%);
  width: 72%; /* Que quepa dentro del cuadro */
  text-align: center;
  font-size: 16px;
  line-height: 1.35;
  color: #5a2a3a;
  font-weight: 500;
  pointer-events: none; /* Para no bloquear clicks */
}

.texto-boton span {
  display: block;
}

@media (max-width: 420px) {
  .texto-boton {
    font-size: 14px;
    width: 80%; /* Ajuste móvil */
  }
}
.bloque-particulas {
  position: relative;
}

.bloque-particulas canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  width: 100%;
  height: 100%;
}
.bloque-particulas-xv {
  position: relative;
}

.bloque-particulas-xv canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  width: 100%;
  height: 100%;
  z-index: 10;
}

/* Para controlar la posición desde JS */
.particula-xv {
  --offset-x: 50%; /* porcentaje horizontal del canvas donde salen partículas */
  --offset-y: 50%; /* porcentaje vertical */
}

</style>
</head>

<body>

<div class="contenedor">

<div class="bloque bloque-particulas">
  <img src="bloque1.webp" loading="eager">
  <canvas id="particulas"></canvas>
</div>
 <div class="bloque bloque-btn">
  <img src="bloque2.webp">
  <div class="texto-boton">
    <span>Con mucho entusiasmo y alegría,</span>
    <span>los invitamos a celebrar</span>
    <span>el momento más especial</span>
    <span>de mi vida</span>
  </div>
</div>
<div class="bloque bloque-particulas-xv">
  <img src="bloque3.webp">
  <canvas id="particulasXV"></canvas>
</div>
  <div class="bloque"><img src="bloque4.webp"></div>
  <div class="bloque"><img src="bloque5.webp"></div>
  <div class="bloque"><img src="bloque6.webp"></div>
  <div class="bloque"><img src="bloque7.webp"></div>
  <div class="bloque"><img src="bloque8.webp"></div>
  <div class="bloque"><img src="bloque9.webp"></div>
  <div class="bloque"><img src="bloque10.webp"></div>

</div>

<!-- AUDIO -->
<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- BOTÓN AUDIO -->
<div class="audio-btn" id="btnAudio">▶</div>

<script>
const musica = document.getElementById("musica");
const btn = document.getElementById("btnAudio");
let activo = false;

btn.addEventListener("click", () => {
  if(!activo){
    musica.play();
    btn.innerHTML = "⏸";
    activo = true;
  } else {
    musica.pause();
    btn.innerHTML = "▶";
    activo = false;
  }
});

document.addEventListener("touchstart", () => {
  if(!activo){
    musica.play();
    btn.innerHTML = "⏸";
    activo = true;
  }
},{ once:true });

/* EFECTO SCROLL */
const bloques = document.querySelectorAll('.bloque');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
},{
  threshold:0.15
});

bloques.forEach(bloque => observer.observe(bloque));

const canvas = document.getElementById('particulas');
const ctx = canvas.getContext('2d');

let w = canvas.width = canvas.offsetWidth;
let h = canvas.height = canvas.offsetHeight;

window.addEventListener('resize', () => {
  w = canvas.width = canvas.offsetWidth;
  h = canvas.height = canvas.offsetHeight;
});

// Generar partículas
const numParticulas = 40;
const particulas = [];

for(let i=0;i<numParticulas;i++){
  particulas.push({
    x: Math.random()*w,
    y: Math.random()*h,
    r: Math.random()*2+1,
    dx: (Math.random()-0.5)*0.7,
    dy: (Math.random()-0.5)*0.7,
    alpha: Math.random()*0.8+0.2
  });
}

function animarParticulas(){
  ctx.clearRect(0,0,w,h);
  particulas.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,215,0,${p.alpha})`; // dorado
    ctx.fill();
    p.x += p.dx;
    p.y += p.dy;

    // rebote de bordes
    if(p.x<0||p.x>w)p.dx*=-1;
    if(p.y<0||p.y>h)p.dy*=-1;
  });
  requestAnimationFrame(animarParticulas);
}
animarParticulas();

const canvasXV = document.getElementById('particulasXV');
const ctxXV = canvasXV.getContext('2d');

let wXV = canvasXV.width = canvasXV.offsetWidth;
let hXV = canvasXV.height = canvasXV.offsetHeight;

window.addEventListener('resize', () => {
  wXV = canvasXV.width = canvasXV.offsetWidth;
  hXV = canvasXV.height = canvasXV.offsetHeight;
});

// Configuración partículas
const numParticulasXV = 15; // pocas partículas
const particulasXV = [];

const offsetX = wXV * 0.5; // posición horizontal inicial (ajustable)
const offsetY = hXV * 0.5; // posición vertical inicial (ajustable)

for (let i = 0; i < numParticulasXV; i++) {
  particulasXV.push({
    x: offsetX,
    y: offsetY,
    r: Math.random() * 1.5 + 1, // radio pequeño
    dx: (Math.random() - 0.5) * 1.5,
    dy: (Math.random() - 0.5) * 1.5,
    alpha: Math.random() * 0.8 + 0.3
  });
}

function animarParticulasXV() {
  ctxXV.clearRect(0, 0, wXV, hXV);
  particulasXV.forEach(p => {
    ctxXV.beginPath();
    ctxXV.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctxXV.fillStyle = `rgba(192,192,192,${p.alpha})`; // plata metálico
    ctxXV.fill();

    p.x += p.dx;
    p.y += p.dy;

    // rebote ligero dentro del área del canvas
    if (p.x < 0 || p.x > wXV) p.dx *= -1;
    if (p.y < 0 || p.y > hXV) p.dy *= -1;
  });
  requestAnimationFrame(animarParticulasXV);
}
animarParticulasXV();

</script>
</body>
</html>
